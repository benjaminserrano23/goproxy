server:
  port: "9090"

ratelimiter:
  url: http://localhost:8080
  limit: 60
  window: "1m"

routes:
  - path: /api
    upstream: http://localhost:8080
    middlewares: [logging, ratelimit, security]

  - path: /static
    upstream: http://localhost:8081
    middlewares: [logging, cache, security]

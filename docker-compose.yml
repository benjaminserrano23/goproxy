services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  ratelimiter:
    build:
      context: ../ratelimiter-go
    environment:
      STORE_TYPE: redis
      REDIS_URL: redis:6379
      PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
    # Port 8080 only exposed within Docker network, not to host

  goproxy:
    build: .
    environment:
      RATELIMITER_URL: http://ratelimiter:8080
      PORT: "9090"
    ports:
      - "9090:9090"
    depends_on:
      - ratelimiter
